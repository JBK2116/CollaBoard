{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 Internal Server Error - CollaBoard</title>
    <link rel="stylesheet" href="{% static '500.css' %}">
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <h1 class="error-code">500</h1>
            <h2 class="error-title">Internal Server Error</h2>
            <p class="error-message">
                Something went wrong on our end.<br>
                Please try again later or <a href="{% url 'landing' %}" class="error-link">return to homepage</a>.
            </p>
        </div>
    </div>
</body>
</html>
