{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - CollaBoard</title>
    <link rel="stylesheet" href="{% static '404.css' %}">
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Oops! Nothing was found</h2>
            <p class="error-message">
                The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.<br>
                <a href="{% url 'landing' %}" class="error-link">Return to homepage</a>
            </p>
        </div>
    </div>
</body>
</html>
