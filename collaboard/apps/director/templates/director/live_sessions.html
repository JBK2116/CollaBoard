{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sessions - CollaBoard</title>
    <link rel="stylesheet" href="{% static 'director/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'director/live_sessions.css' %}">
</head>
<body>
    <!-- Navigation Header -->
    <header class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="/" class="logo-link"><h1 class="logo">CollaBoard</h1></a>
            </div>
            <nav class="navbar-nav">
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="nav-link" style="background: none; border: none; padding: 0; font: inherit; cursor: pointer;">Logout</button>
                </form>
                <a href="#" class="nav-link btn btn-primary">My Account</a>
            </nav>
        </div>
    </header>

    <!-- Breadcrumb -->
    <nav class="breadcrumb-nav">
        <div class="container">
            <ul class="breadcrumb">
                <li><a href="/director/dashboard/">Dashboard</a></li>
                <li>Live Sessions</li>
            </ul>
        </div>
    </nav>

    <main class="main-content live-sessions-main">
        <div class="container">
            <div class="centered-card-wrapper">
                <div class="live-session-card">
                    <h2 class="card-title">Join a Meeting</h2>
                    <form class="access-code-form" id="accessCodeForm" action="#" method="POST">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="accessCode" class="form-label">Enter 8-Digit Access Code</label>
                            <div class="code-input-group">
                                <input 
                                    type="text" 
                                    id="accessCode" 
                                    name="access_code" 
                                    class="form-control code-input" 
                                    maxlength="8" 
                                    pattern="[0-9]{8}" 
                                    placeholder="12345678"
                                    required
                                >
                                <button type="submit" class="btn btn-primary">Join Meeting</button>
                            </div>
                            <div class="form-error" id="codeError"></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="{% static 'director/live_sessions.js' %}"></script>
</body>
</html>
